name: Deploy Branch Preview to GitHub Pages

on:
  push:
    branches-ignore:
      - gh-pages

permissions:
  contents: write

concurrency:
  group: branch-pages-${{ github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish current branch to gh-pages subpath
        env:
          BRANCH_PATH: ${{ github.ref_name }}
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          BOT_NAME: github-actions[bot]
          BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail

          WORKDIR="$(mktemp -d)"
          trap 'rm -rf "$WORKDIR"' EXIT

          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" "$WORKDIR"
          else
            git init "$WORKDIR"
            cd "$WORKDIR"
            git checkout -b gh-pages
            git remote add origin "$REPO_URL"
          fi

          mkdir -p "$WORKDIR/$BRANCH_PATH"

          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude 'test-results/' \
            --exclude 'generated-assets/' \
            --exclude '.DS_Store' \
            ./ "$WORKDIR/$BRANCH_PATH/"

          touch "$WORKDIR/.nojekyll"

          {
            cat <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Wedding Invitation Templates</title>
            <style>
              :root {
                color-scheme: light;
              }

              * {
                box-sizing: border-box;
              }

              body {
                margin: 0;
                min-height: 100vh;
                font-family: "Georgia", "Times New Roman", serif;
                background:
                  radial-gradient(circle at top, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0) 35%),
                  linear-gradient(180deg, #e9e1cf 0%, #d9d0bc 100%);
                color: #4f4638;
              }

              main {
                width: min(720px, calc(100vw - 32px));
                margin: 0 auto;
                padding: 56px 0 72px;
              }

              h1 {
                margin: 0 0 12px;
                font-size: clamp(2.4rem, 7vw, 3.8rem);
                text-align: center;
              }

              p.lead {
                margin: 0 auto 32px;
                max-width: 44rem;
                text-align: center;
                font-size: 1rem;
                line-height: 1.7;
              }

              ul {
                list-style: none;
                margin: 0;
                padding: 0;
                display: grid;
                gap: 14px;
              }

              li {
                padding: 18px 20px;
                border-radius: 20px;
                background: rgba(255, 250, 240, 0.82);
                border: 1px solid rgba(111, 99, 79, 0.14);
                box-shadow: 0 20px 40px rgba(79, 70, 56, 0.08);
              }

              a {
                color: inherit;
                text-decoration: none;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 16px;
                font-weight: 700;
              }

              a span:last-child {
                opacity: 0.72;
                font-size: 0.92rem;
              }

              footer {
                margin-top: 28px;
                text-align: center;
                font-size: 0.92rem;
                opacity: 0.7;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>Wedding Invitation Templates</h1>
              <p class="lead">Each preview below is published from its own branch path inside this same repository, so you can manage every template independently and open it directly from GitHub Pages.</p>
              <ul>
          HTML

            find "$WORKDIR" -mindepth 1 -maxdepth 1 -type d ! -name '.git' | sort | while read -r path; do
              branch_name="$(basename "$path")"
              printf '                <li><a href="./%s/"><span>%s</span><span>/%s/</span></a></li>\n' "$branch_name" "$branch_name" "$branch_name"
            done

            cat <<'HTML'
              </ul>
              <footer>Root index updates automatically whenever any branch preview is deployed.</footer>
            </main>
          </body>
          </html>
          HTML
          } > "$WORKDIR/index.html"

          cd "$WORKDIR"
          git config user.name "$BOT_NAME"
          git config user.email "$BOT_EMAIL"
          git add -A

          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy ${GITHUB_SHA} to ${BRANCH_PATH}"
          git push "$REPO_URL" gh-pages
